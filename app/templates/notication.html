<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'UncutSans', sans-serif;
      background-color: #FFFFFF;
    }
    .logo { max-width: 200px !important; }
    .logo2 { max-width: 100px !important; }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px;
      background-color: #F8F5FF;
    }
    .header {
      text-align: center;
      padding: 20px 0;
    }
    .content {
      background-color: #FFFFFF;
      padding: 20px;
      border-radius: 5px;
      color: #170045;
      line-height: 1.6;
      font-size: 16px;
    }
    .button {
      margin-top: 20px;
      text-align: center;
    }
    .button a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #027840;
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
    }
    .footer img { max-width: 100px; }
    .footer p {
      font-size: 14px;
      color: #767579;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="logo" src="https://res.cloudinary.com/dtmhv0qae/image/upload/v1708637224/swiftsuitemain_narepe.png" alt="SwiftSuite Logo">
    </div>

    <div class="content">
      <p>Hello {{ user.first_name }},</p>

      <p><strong>{{ subject }}</strong></p>

      <p>{{ body|safe }}</p>

      {% if action_url %}
      <div class="button">
        <a href="{{ action_url }}">{{ action_text|default:"View Details" }}</a>
      </div>
      {% endif %}

      <p style="margin-top: 30px;">
        Best regards,<br>
        <strong>The SwiftSuite Team</strong>
      </p>
    </div>

    <div class="footer">
      <img class="logo2" src="https://res.cloudinary.com/dtmhv0qae/image/upload/v1708637224/swiftsuitemain_narepe.png" alt="SwiftSuite Logo">
      <p>© {{ current_year }} SwiftSuite. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
